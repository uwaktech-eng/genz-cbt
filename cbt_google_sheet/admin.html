<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CBT Portal</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
    }
    .wrap {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }
    h1 {
      margin-bottom: 12px;
      font-size: 2.4rem;
    }
    p {
      color: #cbd5e1;
      margin-bottom: 30px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 28px 22px;
      box-shadow: 0 10px 25px rgba(0,0,0,.25);
    }
    .card h2 {
      margin-top: 0;
      margin-bottom: 12px;
    }
    .card p {
      margin-bottom: 20px;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      background: #facc15;
      color: #111827;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: bold;
    }
    .btn:hover { background: #eab308; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>CBT Examination Portal</h1>
    <p>Select the portal you want to enter.</p>

    <div class="grid">
      <div class="card">
        <h2>Student Portal</h2>
        <p>Verify with full name and Reg ID, unlock the CBT, take the exam, and submit online.</p>
        <a href="student.html" class="btn">Open Student Portal</a>
      </div>

      <div class="card">
        <h2>Admin Portal</h2>
        <p>Manage settings, candidates, questions, image links, and results summary.</p>
        <a href="admin.html" class="btn">Open Admin Portal</a>
      </div>
    </div>
  </div>
</body>
</html>
